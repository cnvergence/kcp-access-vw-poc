# Keycloak Helm values (bitnami/keycloak chart).
# Minimal config for local dev — welcome realm configured via scripts/configure-keycloak.sh.
auth:
  adminUser: admin
  adminPassword: admin

extraEnvVars:
  - name: KC_FEATURES
    value: "token-exchange"
  - name: KC_PROXY_HEADERS
    value: xforwarded
  - name: KC_HOSTNAME_STRICT
    value: "false"

service:
  type: ClusterIP
  ports:
    http: 80

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

postgresql:
  enabled: true
  auth:
    postgresPassword: keycloak
    database: keycloak
