apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: kcp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.21
          command:
            - etcd
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd.kcp-system.svc.cluster.local:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --quota-backend-bytes=8589934592
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 200Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: kcp-system
spec:
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
      name: client
