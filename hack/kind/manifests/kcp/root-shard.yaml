# RootShard CR for kcp-operator.
# Based on kcp-dev/kcp/contrib/tilt/shard-root.yaml
apiVersion: operator.kcp.io/v1alpha1
kind: RootShard
metadata:
  name: root
  namespace: kcp-system
spec:
  image:
    repository: ghcr.io/kcp-dev/kcp
    tag: latest
  proxy:
    image:
      repository: ghcr.io/kcp-dev/kcp
      tag: latest
  shardBaseURL: https://root.kcp.localhost:8443
  external:
    hostname: kcp.localhost
    port: 8443
  certificates:
    issuerRef:
      group: cert-manager.io
      kind: Issuer
      name: selfsigned
  cache:
    embedded:
      enabled: true
  etcd:
    endpoints:
      - http://etcd.kcp-system.svc.cluster.local:2379
  auth:
    serviceAccount:
      enabled: true
